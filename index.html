<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>再亂花錢就等死</title>
  <meta name="description" content="信用卡消費紀錄查詢 — 漫畫風格戰鬥面板" />

  <!-- PWA & Favicon -->
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+TC:wght@400;500;700;900&family=Orbitron:wght@700;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- ======== FULL SCREEN LOADING ======== -->
  <div id="loadingScreen">
    <div class="loading-bg-deco">
      <div class="speed-lines"></div>
      <div class="halftone-overlay"></div>
    </div>
    
    <div class="manga-loading-panel">
      <div class="panel-accent-top"></div>
      <div class="loading-header">
        <div class="loading-icon-wrap">⚡</div>
        <div class="loading-title-group">
          <h1 class="loading-title-main">消費紀錄</h1>
          <span class="loading-title-sub">EXPENSE LOG</span>
        </div>
      </div>
      
      <div class="loading-divider"></div>
      
      <div class="loading-body">
        <p class="loading-status">同步交易資料中...</p>
        <div class="cyber-loading-bar">
          <div class="bar-progress"></div>
          <div class="bar-glitch"></div>
        </div>
      </div>
      
      <div class="panel-accent-bottom">
        <span class="accent-code">SYS_BOOT_SEQUENCE // v2.0</span>
        <span class="accent-dots">...</span>
      </div>
    </div>
  </div>

  <!-- Manga background decorations -->
  <div class="bg-deco">
    <div class="speed-lines"></div>
    <div class="halftone-overlay"></div>
    <div class="geo-block geo-1"></div>
    <div class="geo-block geo-2"></div>
    <div class="geo-block geo-3"></div>
  </div>

  <div id="app">

    <!-- ======== HEADER ======== -->
    <header class="app-header">
      <div class="header-bg-accent"></div>
      <div class="header-inner">
        <div class="header-title">
          <div class="title-icon-wrap">
            <span class="title-icon">⚡</span>
          </div>
          <div class="title-text-group">
            <h1 class="title-main">消費紀錄</h1>
            <span class="title-sub">EXPENSE LOG</span>
          </div>
        </div>
        <div class="header-actions" style="display: flex; gap: 8px;">
          <button id="btn-add-txn" class="btn-refresh" style="color: var(--neon-cyan); border-color: var(--neon-cyan);"
            title="新增交易">
            <svg class="refresh-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              style="width: 20px; height: 20px;">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <span class="btn-refresh-label" style="display:none;">ADD</span>
          </button>
          <button id="btn-refresh" class="btn-refresh" title="同步資料">
            <svg id="refresh-icon" class="refresh-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5">
              <polyline points="23 4 23 10 17 10" />
              <polyline points="1 20 1 14 7 14" />
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
            </svg>
            <span class="btn-refresh-label">SYNC</span>
          </button>
        </div>
      </div>
    </header>



    <!-- ======== MONTH SWITCHER ======== -->
    <div class="month-switcher-wrap">
      <div class="month-switcher">
        <button id="btn-prev-month" class="btn-month btn-month-prev" title="上個月">
          <span class="btn-month-arrow">◀</span>
          <span class="btn-month-text">PREV</span>
        </button>
        <div class="month-display">
          <span class="month-deco-line left"></span>
          <span id="month-label" class="month-label">2026年4月</span>
          <span class="month-deco-line right"></span>
        </div>
        <button id="btn-next-month" class="btn-month btn-month-next" title="下個月">
          <span class="btn-month-text">NEXT</span>
          <span class="btn-month-arrow">▶</span>
        </button>
      </div>
    </div>
    <!-- ======== FILTER BAR ======== -->
    <div class="filter-wrap">
      <div class="filter-row">
        <select id="filter-category" class="filter-select">
          <option value="ALL">全部分類</option>
          <option value="購物">購物</option>
          <option value="餐飲">餐飲</option>
          <option value="交通">交通</option>
          <option value="訂閱">訂閱</option>
          <option value="醫療">醫療</option>
          <option value="學習">學習</option>
          <option value="娛樂">娛樂</option>
          <option value="帳單">帳單</option>
          <option value="網購">網購</option>
          <option value="運動">運動</option>
          <option value="其他">其他</option>
        </select>
        <select id="filter-type" class="filter-select">
          <option value="ALL">全部類型</option>
          <option value="expense">支出</option>
          <option value="refund">退款</option>
        </select>
      </div>
      <div class="filter-row">
        <input type="text" id="filter-keyword" class="filter-input" placeholder="搜尋店家或備註...">
      </div>
    </div>

    <!-- ======== SUMMARY PANEL ======== -->
    <section class="summary-section" aria-label="本月摘要">
      <div class="summary-panel">
        <div class="panel-corner tl"></div>
        <div class="panel-corner tr"></div>
        <div class="panel-corner bl"></div>
        <div class="panel-corner br"></div>

        <div class="summary-grid">
          <div class="summary-card summary-amount-card">
            <div class="summary-card-inner">
              <p class="summary-label">TOTAL<span class="label-jp">総消費</span></p>
              <p id="total-amount" class="summary-value amount-value">—</p>
            </div>
            <div class="card-accent-stripe"></div>
          </div>

          <div class="summary-divider">
            <span class="divider-bolt">⬥</span>
          </div>

          <div class="summary-card summary-count-card">
            <div class="summary-card-inner">
              <p class="summary-label">COUNT<span class="label-jp">取引数</span></p>
              <p id="total-count" class="summary-value count-value">—</p>
            </div>
            <div class="card-accent-stripe stripe-alt"></div>
          </div>
        </div>
      </div>

      <div class="summary-sync">
        <span class="sync-dot"></span>
        <span class="sync-label">LAST SYNC //</span>
        <span id="last-sync" class="sync-time">—</span>
      </div>
    </section>

    <!-- ======== TRANSACTION LIST ======== -->
    <section class="txn-section" aria-label="交易列表">

      <div id="txn-status" class="txn-status hidden">
        <div class="status-icon-wrap">
          <span class="status-icon-char">?!</span>
        </div>
        <p id="status-message" class="status-message">查無資料</p>
        <p id="status-sub" class="status-sub"></p>
      </div>

      <ul id="txn-list" class="txn-list" role="list"></ul>
    </section>

    <!-- ======== LOADING OVERLAY ======== -->
    <div id="loading-overlay" class="loading-overlay hidden">
      <div class="loading-content">
        <div class="loading-spinner">
          <div class="spinner-ring"></div>
          <span class="spinner-text">⚡</span>
        </div>
        <p class="loading-label">LOADING...</p>
        <p class="loading-sub">データ読み込み中</p>
      </div>
    </div>

    <!-- ======== ERROR TOAST ======== -->
    <div id="error-toast" class="error-toast hidden" role="alert">
      <span class="toast-icon">💥</span>
      <span id="error-msg" class="toast-msg">載入失敗，請稍後再試</span>
    </div>

    <!-- ======== ADD MODAL ======== -->
    <div id="add-modal" class="edit-modal hidden" role="dialog" aria-labelledby="add-modal-title">
      <div class="modal-backdrop"></div>
      <div class="modal-container anim-pop-in">
        <div class="modal-header">
          <div class="modal-title-wrap">
            <div class="modal-icon-preview" style="border-color: var(--neon-green)">➕</div>
            <h2 id="add-modal-title" class="modal-title">新增交易 // ADD</h2>
          </div>
          <button id="btn-add-close" class="btn-modal-close">&times;</button>
        </div>

        <div class="modal-body">
          <div class="input-group">
            <label class="input-label" for="add-merchant">店家名稱 / MERCHANT</label>
            <input type="text" id="add-merchant" class="manga-input" placeholder="輸入商家名稱...">
          </div>

          <div class="input-row">
            <div class="input-group flex-1">
              <label class="input-label" for="add-amount">金額 / AMOUNT</label>
              <input type="number" id="add-amount" class="manga-input" placeholder="0.00">
            </div>
            <div class="input-group flex-1">
              <label class="input-label" for="add-category">分類 / CATEG</label>
              <select id="add-category" class="manga-input manga-select"
                style="height: 100%; border-radius: 0; appearance: none; background-color: var(--bg-dark);">
                <option value="餐飲">餐飲</option>
                <option value="購物">購物</option>
                <option value="交通">交通</option>
                <option value="訂閱">訂閱</option>
                <option value="其他">其他</option>
              </select>
            </div>
          </div>

          <div class="input-group">
            <label class="input-label" for="add-date">日期時間 / DATE</label>
            <input type="datetime-local" id="add-date" class="manga-input">
          </div>

          <div class="input-group">
            <label class="input-label" for="add-note">備註 / NOTE</label>
            <textarea id="add-note" class="manga-input manga-textarea" rows="2" placeholder="寫點什麼..."></textarea>
          </div>
        </div>

        <div class="modal-footer">
          <button id="btn-add-cancel" class="btn-manga-secondary">CANCEL</button>
          <button id="btn-add-save" class="btn-manga-primary" style="background: var(--neon-green); color: #000;">ADD
            TXN</button>
        </div>
      </div>
    </div>

    <!-- ======== EDIT MODAL ======== -->
    <div id="edit-modal" class="edit-modal hidden" role="dialog" aria-labelledby="modal-title">
      <div class="modal-backdrop"></div>
      <div class="modal-container anim-pop-in">
        <div class="modal-header">
          <div class="modal-title-wrap">
            <div id="modal-icon-preview" class="modal-icon-preview">💳</div>
            <h2 id="modal-title" class="modal-title">編輯分錄 // EDIT</h2>
          </div>
          <button id="btn-modal-close" class="btn-modal-close">&times;</button>
        </div>

        <div class="modal-body">
          <div class="input-group">
            <label class="input-label" for="edit-merchant">店家名稱 / MERCHANT</label>
            <input type="text" id="edit-merchant" class="manga-input" placeholder="輸入商家名稱...">
          </div>

          <div class="input-row">
            <div class="input-group flex-1">
              <label class="input-label" for="edit-amount">金額 / AMOUNT</label>
              <input type="number" id="edit-amount" class="manga-input" placeholder="0.00">
            </div>
          </div>

          <div class="input-group">
            <label class="input-label">圖示選擇 / ICON SELECTOR</label>
            <div id="icon-grid" class="icon-grid">
              <!-- Icons will be injected via JS -->
            </div>
          </div>

          <div class="input-group">
            <label class="input-label" for="edit-note">備註 / NOTE</label>
            <textarea id="edit-note" class="manga-input manga-textarea" rows="2" placeholder="寫點什麼..."></textarea>
          </div>
        </div>

        <div class="modal-footer">
          <button id="btn-edit-cancel" class="btn-manga-secondary">CANCEL</button>
          <button id="btn-edit-save" class="btn-manga-primary">SAVE TRANSACTION</button>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>

</html>
